<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destined ❤️‍🔥</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== LOADING SCREEN ===== -->
    <div id="loadingScreen">
        <div class="loader">
            <!-- YOUR LOGO (BLUE STAR) -->
            <div class="loader-logo">
                <div class="blue-star">⭐</div>
                <div class="smiley-face">😊</div>
                <div class="sparkle">✨</div>
            </div>
            <p>Connecting your fate...</p>
        </div>
        <div class="loading-bar"></div>
    </div>

    <!-- ===== MAIN LANDING ===== -->
    <div id="mainContent">
        <div class="landing-container">
            
            <!-- Moving Gold Star -->
            <div class="moving-star">✦</div>

            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-star">⭐</div>
                <div class="logo-smile">😊</div>
                <h1 class="brand-title">DESTINED</h1>
            </div>

            <!-- Tagline -->
            <div class="tagline-section">
                <p class="main-tagline">Get connected to the one</p>
                <p class="sub-tagline">destined for you...</p>
            </div>

            <!-- CTA -->
            <div class="cta-section">
                <a href="signup.html" class="btn-glow">Find the one now</a>
                <p class="login-link">Already have an account? <a href="login.html">Sign In</a></p>
            </div>

        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
