<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destined ❤️‍🔥</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== LOADING SCREEN ===== -->
    <div id="loadingScreen">
        <div class="loader">
            <!-- Logo with Glow -->
            <div class="loader-logo">
                <span class="loader-star">✦</span>
                <h1 class="loader-title">DESTINED</h1>
            </div>
            <p class="loader-text">Connecting your fate...</p>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- ===== MAIN LANDING ===== -->
    <div id="mainContent">
        <div class="landing-container">
            
            <!-- Moving Star -->
            <div class="moving-star">✦</div>

            <!-- Floating Particles -->
            <div class="particle particle-1"></div>
            <div class="particle particle-2"></div>
            <div class="particle particle-3"></div>
            <div class="particle particle-4"></div>

            <!-- Glow Effect -->
            <div class="glow-ring"></div>

            <!-- Content -->
            <div class="landing-content">
                <div class="brand">
                    <span class="brand-star">✦</span>
                    <h1 class="brand-title">DESTINED</h1>
                    <p class="brand-subtitle">Connecting your fate...</p>
                </div>

                <div class="tagline">
                    <p class="tagline-main">Get connected to the one</p>
                    <p class="tagline-sub">destined for you</p>
                </div>

                <div class="actions">
                    <a href="signup.html" class="btn-primary">Find the one now</a>
                    <p class="login-link">Already have an account? <a href="login.html">Sign In</a></p>
                </div>
            </div>

        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
