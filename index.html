<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Destined — Swipe Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0D0D0D;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            max-width: 420px;
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #0D0D0D 0%, #1A0A2E 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ===== TOP BAR ===== */
        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 8px 16px;
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            z-index: 10;
        }

        .app-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFD700, #9B59B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .top-icons {
            display: flex;
            gap: 16px;
        }

        .top-icons .icon {
            font-size: 18px;
            cursor: pointer;
            color: #B0B0B0;
            background: none;
            border: none;
            transition: transform 0.2s;
        }

        .top-icons .icon:hover {
            transform: scale(1.1);
            color: #FFFFFF;
        }

        /* ===== FOMO BANNER ===== */
        .fomo-banner {
            background: linear-gradient(135deg, #FF6B9D, #9B59B6);
            padding: 6px 16px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            color: #FFFFFF;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fomoPulse 2s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes fomoPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        .fomo-timer {
            font-size: 11px;
            opacity: 0.8;
        }

        /* ===== CARD CONTAINER ===== */
        #cardContainer {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 12px;
            position: relative;
            overflow: hidden;
        }

        /* ===== SWIPE CARD ===== */
        .swipe-card {
            width: 100%;
            max-width: 380px;
            height: 540px;
            border-radius: 24px;
            background: linear-gradient(145deg, #1A0A2E, #2D1B4E);
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            touch-action: none;
            cursor: grab;
            transition: transform 0.1s ease;
        }

        .swipe-card:active {
            cursor: grabbing;
        }

        /* ===== PHOTO SECTION ===== */
        .card-photo {
            width: 100%;
            height: 65%;
            background: linear-gradient(135deg, #2D1B4E, #4A2D6B);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 72px;
            color: rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        .card-photo .photo-placeholder {
            font-size: 72px;
            opacity: 0.3;
        }

        /* ===== ONLINE INDICATOR ===== */
        .online-indicator {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 4px 12px 4px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .online-dot.online {
            background: #2ECC71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.5);
        }

        .online-dot.offline {
            background: #555;
        }

        .online-text {
            font-size: 10px;
            font-weight: 500;
            color: #FFFFFF;
            letter-spacing: 0.3px;
        }

        /* ===== COMPATIBILITY BADGE ===== */
        .compatibility-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            max-width: 140px;
        }

        .compatibility-badge:hover {
            transform: scale(1.05);
            border-color: rgba(255, 215, 0, 0.4);
        }

        .compatibility-badge .score {
            font-size: 14px;
            font-weight: 700;
            color: #FFD700;
        }

        .compatibility-badge .score-text {
            font-size: 8px;
            color: #B0B0B0;
            display: block;
            margin-top: 1px;
        }

        .compatibility-badge .view-icon {
            font-size: 11px;
            margin-left: 4px;
            color: #9B59B6;
        }

        .compatibility-badge .love-prompt {
            font-size: 7px;
            color: #FF6B9D;
            display: block;
            margin-top: 2px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* ===== INFO SECTION ===== */
        .card-info {
            padding: 12px 16px 8px 16px;
            height: 35%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-info .profile-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .card-info .profile-icon {
            font-size: 16px;
        }

        .card-info .online-dot-small {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .card-info .online-dot-small.online {
            background: #2ECC71;
        }

        .card-info .online-dot-small.offline {
            background: #555;
        }

        .card-info .name {
            font-size: 18px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .card-info .age {
            font-size: 18px;
            font-weight: 400;
            color: #B0B0B0;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #2ECC71;
            color: #FFFFFF;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-left: 2px;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
            flex-shrink: 0;
        }

        .card-info .tier {
            font-size: 12px;
            font-weight: 600;
            color: #FFD700;
            margin: 2px 0;
        }

        .card-info .location {
            font-size: 12px;
            color: #B0B0B0;
        }

        .card-info .relationship {
            font-size: 12px;
            color: #D4A5E8;
            margin: 2px 0;
        }

        .card-info .vibes {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 4px 0;
        }

        .card-info .vibe-tag {
            background: rgba(155, 89, 182, 0.2);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 9px;
            color: #D4A5E8;
            letter-spacing: 0.3px;
        }

        .card-info .bio {
            font-size: 12px;
            color: #B0B0B0;
            font-style: italic;
            padding: 4px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 4px;
        }

        /* ===== SMALL ACTIONS ===== */
        .small-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            padding: 6px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .small-actions .action-icon {
            background: none;
            border: none;
            color: #B0B0B0;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px;
        }

        .small-actions .action-icon:hover {
            color: #FFFFFF;
            transform: scale(1.15);
        }

        /* ===== BIG ACTIONS ===== */
        .big-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 8px 0 4px 0;
        }

        .big-actions .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .big-actions .action-btn.pass {
            background: rgba(231, 76, 60, 0.15);
            color: #E74C3C;
            border: 2px solid rgba(231, 76, 60, 0.2);
        }

        .big-actions .action-btn.pass:hover {
            background: rgba(231, 76, 60, 0.3);
            transform: scale(1.1);
        }

        .big-actions .action-btn.super {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        .big-actions .action-btn.super:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.1);
        }

        .big-actions .action-btn.like {
            background: rgba(155, 89, 182, 0.15);
            color: #9B59B6;
            border: 2px solid rgba(155, 89, 182, 0.2);
        }

        .big-actions .action-btn.like:hover {
            background: rgba(155, 89, 182, 0.3);
            transform: scale(1.1);
        }

        .big-actions .action-btn:active {
            transform: scale(0.9);
        }

        /* ===== BOTTOM NAV ===== */
        #bottomNav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 16px 0;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        #bottomNav .nav-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 10px;
            border-radius: 8px;
        }

        #bottomNav .nav-btn.active {
            color: #FFD700;
            transform: scale(1.1);
        }

        #bottomNav .nav-btn:hover {
            color: #FFFFFF;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-align: center;
            max-width: 80%;
        }

        .toast.show {
            opacity: 1;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .swipe-card {
                height: 480px;
            }
            .card-info .name {
                font-size: 16px;
            }
            .card-info .age {
                font-size: 16px;
            }
            .big-actions .action-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            .compatibility-badge .score {
                font-size: 12px;
            }
        }

        @media (max-height: 700px) {
            .swipe-card {
                height: 430px;
            }
            .card-photo {
                height: 58%;
            }
            .card-info {
                height: 42%;
                padding: 8px 12px 4px 12px;
            }
            .card-info .name {
                font-size: 15px;
            }
            .card-info .age {
                font-size: 15px;
            }
            .big-actions .action-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .small-actions .action-icon {
                font-size: 14px;
            }
        }

        /* ===== MATCH OVERLAY ===== */
        .match-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 420px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .match-heart {
            animation: heartBeat 0.8s ease-in-out infinite;
        }

        .match-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 32px;
            border-radius: 16px;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 280px;
            text-align: center;
        }

        .match-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
        }

        .match-btn.primary {
            background: linear-gradient(135deg, #FFD700, #9B59B6);
            border: none;
            color: #0D0D0D;
        }

        .match-btn.primary:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="phone-container">

        <!-- TOP BAR -->
        <div id="topBar">
            <div class="app-title">DESTINED</div>
            <div class="top-icons">
                <button class="icon" onclick="alert('🗺️ Map')">🗺️</button>
                <button class="icon" onclick="alert('🔔 Notifications')">🔔</button>
                <button class="icon" onclick="alert('☰ Menu')">☰</button>
            </div>
        </div>

        <!-- FOMO BANNER -->
        <div class="fomo-banner">
            🔥 2,341 people are online RIGHT NOW!
            <span class="fomo-timer">⏳ 8s</span>
        </div>

        <!-- CARD CONTAINER -->
        <div id="cardContainer"></div>

        <!-- BOTTOM NAV -->
        <div id="bottomNav">
            <button class="nav-btn active" onclick="alert('🔥 Discover')">🔥</button>
            <button class="nav-btn" onclick="alert('🩷 Likes')">🩷</button>
            <button class="nav-btn" onclick="alert('💬 Chat')">💬</button>
            <button class="nav-btn" onclick="alert('✨ Spark')">✨</button>
            <button class="nav-btn" onclick="alert('👤 Profile')">👤</button>
        </div>

        <!-- TOAST -->
        <div id="toast" class="toast"></div>

    </div>

    <script>
        // ============================================
        // PROFILES DATA
        // ============================================
        const profiles = [{
            id: 1,
            name: 'Jameson',
            age: 30,
            verified: true,
            tier: 'VIP 🌟',
            location: '3 miles away',
            relationship: 'Looking for: Long-term relationship',
            vibes: ['Adventurer', 'Foodie', 'Christian'],
            bio: 'I love traveling and trying new foods...',
            online: true,
            compatibility: 100,
            compatibilityText: 'you perfect match',
            emoji: '😍',
            photo: '📸'
        }, {
            id: 2,
            name: 'Sarah',
            age: 28,
            verified: true,
            tier: 'Premium ⭐',
            location: '5 miles away',
            relationship: 'Looking for: Creative partnership',
            vibes: ['Creative', 'Foodie', 'Empath'],
            bio: 'Creative soul who loves art and good food.',
            online: false,
            compatibility: 85,
            compatibilityText: 'great match',
            emoji: '😊',
            photo: '🎨'
        }, {
            id: 3,
            name: 'Mike',
            age: 31,
            verified: false,
            tier: 'Free 💙',
            location: '2 miles away',
            relationship: 'Looking for: Something real',
            vibes: ['Practical', 'Loyal', 'Family'],
            bio: 'Looking for something real.',
            online: true,
            compatibility: 67,
            compatibilityText: 'good potential',
            emoji: '🤔',
            photo: '🏠'
        }, {
            id: 4,
            name: 'Emma',
            age: 27,
            verified: true,
            tier: 'Premium ⭐',
            location: '4 miles away',
            relationship: 'Looking for: Long-term relationship',
            vibes: ['Art', 'Design', 'Travel'],
            bio: 'Art and design lover. Let\'s explore the world together.',
            online: false,
            compatibility: 55,
            compatibilityText: 'not your type',
            emoji: '😕',
            photo: '🎭'
        }, {
            id: 5,
            name: 'Alex',
            age: 24,
            verified: true,
            tier: 'Elite 🔱',
            location: '1 mile away',
            relationship: 'Looking for: Intellectual connection',
            vibes: ['Tech', 'Literature', 'Philosophy'],
            bio: 'Tech enthusiast and book lover. Let\'s talk about life.',
            online: true,
            compatibility: 92,
            compatibilityText: 'almost perfect',
            emoji: '🥰',
            photo: '📚'
        }];

        // ============================================
        // STATE
        // ============================================
        let currentIndex = 0;
        let isDragging = false;
        let startX = 0;
        let toast = document.getElementById('toast');
        let toastTimeout = null;

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, emoji = '💜') {
            toast.textContent = `${emoji} ${message}`;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ============================================
        // RENDER CARD
        // ============================================
        function renderCard() {
            const container = document.getElementById('cardContainer');

            if (currentIndex >= profiles.length) {
                container.innerHTML = `
                    <div class="swipe-card" style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;">
                        <div style="font-size:48px;margin-bottom:16px;">🎯</div>
                        <h3 style="color:#FFFFFF;">No more profiles!</h3>
                        <p style="color:#B0B0B0;font-size:14px;margin-top:8px;">Check back later for new matches.</p>
                        <button onclick="resetProfiles()" style="margin-top:16px;background:#9B59B6;border:none;padding:10px 24px;border-radius:20px;color:#fff;font-weight:600;cursor:pointer;">🔄 Refresh</button>
                    </div>
                `;
                return;
            }

            const p = profiles[currentIndex];
            const onlineDot = p.online ? 'online' : 'offline';
            const onlineText = p.online ? 'Online Now' : 'Offline';
            const lovePrompt = p.compatibility >= 90 ? '💡 Send 😍 🌹 ⭐ to prove your love!' :
                p.compatibility >= 70 ? '💡 Send 🌹 ⭐ to get their attention!' :
                '💡 Send ⭐ to stand out from the crowd!';

            const verifiedBadge = p.verified ?
                `<span class="verified-badge">✓</span>` :
                '';

            container.innerHTML = `
                <div class="swipe-card" id="swipeCard">
                    <div class="card-photo">
                        <span class="photo-placeholder">${p.photo}</span>

                        <div class="online-indicator">
                            <span class="online-dot ${onlineDot}"></span>
                            <span class="online-text">${onlineText}</span>
                        </div>

                        <div class="compatibility-badge" onclick="viewCompatibility()">
                            <span class="score">${p.compatibility}% ${p.emoji}</span>
                            <span class="score-text">${p.compatibilityText} 👁️‍🗨️</span>
                            <span class="love-prompt">${lovePrompt}</span>
                        </div>
                    </div>

                    <div class="card-info">
                        <div>
                            <div class="profile-row">
                                <span class="profile-icon">🧑‍💼</span>
                                <span class="online-dot-small ${onlineDot}"></span>
                                <span class="name">${p.name}</span>
                                <span class="age">${p.age}</span>
                                ${verifiedBadge}
                            </div>
                            <div class="tier">${p.tier}</div>
                            <div class="location">📍 ${p.location}</div>
                            <div class="relationship">💑 ${p.relationship}</div>
                            <div class="vibes">
                                ${p.vibes.map(v => `<span class="vibe-tag">#${v}</span>`).join('')}
                            </div>
                            <div class="bio">"${p.bio}"</div>
                        </div>
                    </div>

                    <div class="small-actions">
                        <button class="action-icon" onclick="rewind()" title="Rewind">↩️</button>
                        <button class="action-icon" onclick="superLike()" title="Super Like">⭐</button>
                        <button class="action-icon" onclick="sendLove()" title="Send Love">😍</button>
                        <button class="action-icon" onclick="sendGift()" title="Send Gift">🌹</button>
                        <button class="action-icon" onclick="viewMusic()" title="Music">🎶</button>
                    </div>

                    <div class="big-actions">
                        <button class="action-btn pass" onclick="passProfile()">❌</button>
                        <button class="action-btn super" onclick="superLike()">⚡</button>
                        <button class="action-btn like" onclick="likeProfile()">💜</button>
                    </div>
                </div>
            `;

            // ===== SWIPE INTERACTION =====
            const card = document.getElementById('swipeCard');
            let startX = 0,
                isDragging = false;

            card.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
                card.style.transition = 'none';
            });

            card.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const dx = e.touches[0].clientX - startX;
                const rotate = dx * 0.08;
                card.style.transform = `translate(${dx}px, 0px) rotate(${rotate}deg)`;
            });

            card.addEventListener('touchend', (e) => {
                isDragging = false;
                const dx = e.changedTouches[0].clientX - startX;
                if (Math.abs(dx) > 80) {
                    card.style.transition = 'transform 0.3s ease';
                    if (dx > 0) {
                        card.style.transform = 'translate(400px, 80px) rotate(20deg)';
                        setTimeout(() => { likeProfile(); }, 300);
                    } else {
                        card.style.transform = 'translate(-400px, 80px) rotate(-20deg)';
                        setTimeout(() => { passProfile(); }, 300);
                    }
                } else {
                    card.style.transition = 'transform 0.3s ease';
                    card.style.transform = '';
                }
            });

            // Desktop support
            card.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                isDragging = true;
                card.style.transition = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const rotate = dx * 0.08;
                card.style.transform = `translate(${dx}px, 0px) rotate(${rotate}deg)`;
            });

            document.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                const dx = e.clientX - startX;
                if (Math.abs(dx) > 80) {
                    card.style.transition = 'transform 0.3s ease';
                    if (dx > 0) {
                        card.style.transform = 'translate(400px, 80px) rotate(20deg)';
                        setTimeout(() => { likeProfile(); }, 300);
                    } else {
                        card.style.transform = 'translate(-400px, 80px) rotate(-20deg)';
                        setTimeout(() => { passProfile(); }, 300);
                    }
                } else {
                    card.style.transition = 'transform 0.3s ease';
                    card.style.transform = '';
                }
            });
        }
